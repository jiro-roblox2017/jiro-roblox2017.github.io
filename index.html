<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL動画プレイヤー</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #0f172a;
            color: #f8fafc;
            text-align: center;
            padding: 30px 10px;
            margin: 0;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #1e293b;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 20px;
            color: #38bdf8;
        }
        /* 入力エリアのデザイン */
        .input-area {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        input[type="text"] {
            flex: 1;
            padding: 12px;
            border-radius: 6px;
            border: 2px solid #334155;
            background-color: #0f172a;
            color: #fff;
            font-size: 1rem;
        }
        input[type="text"]:focus {
            border-color: #38bdf8;
            outline: none;
        }
        button {
            padding: 0 20px;
            background-color: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
        }
        button:hover {
            background-color: #7dd3fc;
        }
        /* プレイヤー画面 */
        .video-wrapper {
            position: relative;
            width: 100%;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 16 / 9;
        }
        video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .error-message {
            color: #f87171;
            margin-top: 10px;
            font-size: 0.9rem;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🔗 URL動画プレイヤー</h1>
        
        <!-- URLを入力して読み込む部分 -->
        <div class="input-area">
            <input type="text" id="videoUrl" placeholder="動画のURL（.mp4など）をここに貼り付け">
            <button onclick="loadVideo()">再生</button>
        </div>

        <!-- ビデオ再生画面 -->
        <div class="video-wrapper">
            <video id="myPlayer" controls preload="metadata">
                お使いのブラウザは動画再生に対応していません。
            </video>
        </div>
        
        <div id="error" class="error-message">動画の読み込みに失敗しました。URLを確認してください。</div>
    </div>

    <script>
        // ボタンを押した時に動画を読み込む仕組み（JavaScript）
        function loadVideo() {
            const urlInput = document.getElementById('videoUrl').value.trim();
            const player = document.getElementById('myPlayer');
            const errorDiv = document.getElementById('error');
            
            if (urlInput === "") {
                alert("URL入力をしてください");
                return;
            }

            errorDiv.style.display = 'none';
            
            // プレイヤーに新しいURLをセットして再生
            player.src = urlInput;
            player.load();
            
            // 自動再生を試みる（ブラウザの仕様で音消しじゃないと動かない場合があるため、手動再生推奨）
            player.play().catch(error => {
                console.log("自動再生がブロックされました。再生ボタンを押してください。");
            });

            // エラー検知
            player.onerror = function() {
                errorDiv.style.display = 'block';
            };
        }
    </script>

</body>
</html>
