<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>マイホームページ</title>
    <style>
        /* ここにデザイン（CSS）を書いています */
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            background: white;
            max-width: 600px;
            margin: 0 auto;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #24292e; /* GitHub風のダークグレー */
        }
        p {
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2ea44f; /* GitHub風の緑色 */
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn:hover {
            background-color: #2c974b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>👋 こんにちは！私のウェブサイトへようこそ</h1>
        <p>これは GitHub Pages を使って公開するテストページです。</p>
        <p>ここにあなたの自己紹介や、趣味、作った作品などの紹介文を自由に書いてみてください。</p>
        
        <!-- ボタンの例（リンク先は自由に変えられます） -->
        <a href="https://github.com" class="btn" target="_blank">私のGitHubを見る</a>
    </div>

</body>
</html>
